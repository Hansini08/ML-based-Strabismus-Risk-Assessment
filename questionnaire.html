<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinical Details</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.container {
    background: rgba(255, 255, 255, 0.95);
    border-radius: 20px;
    padding: 50px 40px;
    max-width: 500px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(10px);
    animation: slideIn 0.6s ease-out;
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.progress-bar {
    width: 100%;
    height: 4px;
    background: #e0e0e0;
    border-radius: 2px;
    margin-bottom: 30px;
    overflow: hidden;
}

.progress-fill {
    width: 66%;
    height: 100%;
    background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
    border-radius: 2px;
}

h2 {
    color: #333;
    font-size: 1.8em;
    margin-bottom: 10px;
    text-align: center;
    font-weight: 600;
}

.subtitle {
    color: #666;
    font-size: 0.95em;
    text-align: center;
    margin-bottom: 30px;
}

form {
    display: grid;
    gap: 20px;
}

.form-group {
    display: flex;
    flex-direction: column;
    animation: slideIn 0.6s ease-out both;
}

.form-group:nth-child(1) { animation-delay: 0.1s; }
.form-group:nth-child(2) { animation-delay: 0.2s; }
.form-group:nth-child(3) { animation-delay: 0.3s; }
.form-group:nth-child(4) { animation-delay: 0.4s; }
.form-group:nth-child(5) { animation-delay: 0.5s; }
.form-group:nth-child(6) { animation-delay: 0.6s; }

label {
    color: #333;
    font-weight: 600;
    margin-bottom: 8px;
    font-size: 0.95em;
    display: flex;
    align-items: center;
    gap: 8px;
}

label::before {
    font-size: 1.2em;
}

input, select {
    padding: 12px 15px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 1em;
    transition: all 0.3s ease;
    font-family: inherit;
    background: white;
    color: #333;
}

input:focus, select:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

input::placeholder {
    color: #999;
}

button {
    padding: 14px 30px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    font-size: 1.05em;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    margin-top: 20px;
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    position: relative;
    overflow: hidden;
}

button::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.3);
    transform: translate(-50%, -50%);
    transition: width 0.6s ease, height 0.6s ease;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 25px rgba(102, 126, 234, 0.6);
}

button:hover::before {
    width: 300px;
    height: 300px;
}

.field-icon {
    display: inline-block;
}

@media (max-width: 600px) {
    .container {
        padding: 30px 20px;
    }
    
    h2 {
        font-size: 1.4em;
    }
}
</style>

</head>

<body>

<div class="container">
    <div class="progress-bar">
        <div class="progress-fill"></div>
    </div>

    <h2>Clinical Details</h2>
    <p class="subtitle">Step 2 of 3 - Tell us about your health</p>

    <form action="/predict" method="post">
        <input type="hidden" name="img_path" value="{{ img_path }}">

        <div class="form-group">
            <label><span class="field-icon">🪪</span> Patient Name / ID (optional)</label>
            <input type="text" name="patient_name" placeholder="Enter patient name or file ID">
        </div>

        <div class="form-group">
            <label><span class="field-icon">👤</span> Age</label>
            <input type="number" name="age" required min="0" max="150" placeholder="Enter your age">
        </div>

        <div class="form-group">
            <label><span class="field-icon">⏱️</span> Onset Type</label>
            <select name="onset" required>
                <option value="">Select onset type</option>
                <option value="0">Since Birth</option>
                <option value="1">Gradual</option>
                <option value="2">Sudden</option>
            </select>
        </div>

        <div class="form-group">
            <label><span class="field-icon">👁️</span> Double Vision (Diplopia)?</label>
            <select name="double_vision" required>
                <option value="">Select option</option>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div class="form-group">
            <label><span class="field-icon">🤕</span> Frequent Headaches?</label>
            <select name="headache" required>
                <option value="">Select option</option>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div class="form-group">
            <label><span class="field-icon">🩺</span> Diabetes?</label>
            <select name="diabetes" required>
                <option value="">Select option</option>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div class="form-group">
            <label><span class="field-icon">🧬</span> Thyroid Issues?</label>
            <select name="thyroid" required>
                <option value="">Select option</option>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <button type="submit">Get Results</button>
    </form>
</div>

</body>
</html>
