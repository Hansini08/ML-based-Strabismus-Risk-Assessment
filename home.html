<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strabismus Risk Assessment System</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
}

/* Animated background elements */
body::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -10%;
    width: 500px;
    height: 500px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 50%;
    animation: float 8s ease-in-out infinite;
}

body::after {
    content: '';
    position: absolute;
    bottom: -30%;
    left: -5%;
    width: 400px;
    height: 400px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 50%;
    animation: float 10s ease-in-out infinite reverse;
}

@keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(30px); }
}

.container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 40px;
}

.logo-section {
    margin-bottom: 50px;
    animation: slideDown 0.8s ease-out;
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

h1 {
    font-size: 3.5em;
    color: white;
    margin-bottom: 20px;
    font-weight: 700;
    text-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    letter-spacing: -1px;
}

.subtitle {
    font-size: 1.3em;
    color: rgba(255, 255, 255, 0.9);
    margin-bottom: 15px;
    font-weight: 300;
    letter-spacing: 0.5px;
}

.tagline {
    font-size: 1.1em;
    color: rgba(255, 255, 255, 0.85);
    margin-bottom: 50px;
    font-weight: 300;
}

.button-container {
    animation: slideUp 0.8s ease-out 0.3s both;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

button {
    padding: 16px 50px;
    background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
    color: white;
    border: none;
    border-radius: 50px;
    font-size: 1.1em;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 8px 25px rgba(0, 157, 255, 0.4);
    transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
}

button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.2);
    transition: left 0.3s ease;
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 35px rgba(0, 157, 255, 0.5);
}

button:hover::before {
    left: 100%;
}

button:active {
    transform: translateY(-1px);
}

.feature-icons {
    display: flex;
    justify-content: center;
    gap: 50px;
    margin-top: 60px;
    flex-wrap: wrap;
}

.feature {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    opacity: 0.9;
    transition: transform 0.3s ease, opacity 0.3s ease;
}

.feature:hover {
    transform: scale(1.05);
    opacity: 1;
}

.feature-icon {
    font-size: 2.5em;
}

.feature-text {
    color: rgba(255, 255, 255, 0.85);
    font-size: 0.95em;
    font-weight: 500;
}

@media (max-width: 768px) {
    h1 {
        font-size: 2.5em;
    }
    
    .feature-icons {
        gap: 30px;
    }
    
    button {
        padding: 14px 40px;
        font-size: 1em;
    }
}
</style>
</head>

<body>
<div class="container">
    <div class="logo-section">
        <h1>Eye Care AI</h1>
        <p class="subtitle">Strabismus Risk Assessment System</p>
        <p class="tagline">Advanced ML-Powered Eye Health Analysis</p>
    </div>

    <div class="button-container">
        <form action="/upload">
            <button type="submit">Begin Assessment</button>
        </form>
    </div>

    <div class="feature-icons">
        <div class="feature">
            <div class="feature-icon">🖼️</div>
            <div class="feature-text">Image Analysis</div>
        </div>
        <div class="feature">
            <div class="feature-icon">📊</div>
            <div class="feature-text">Clinical Data</div>
        </div>
        <div class="feature">
            <div class="feature-icon">⚡</div>
            <div class="feature-text">Instant Results</div>
        </div>
    </div>
</div>
</body>
</html>
